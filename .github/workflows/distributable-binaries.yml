name: Build distributable binaries

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build Linux distribution archive
        run: |
          nix build .#dist-linux-x86_64 --out-link result-linux

      - name: Stage Linux artifact
        run: |
          set -euo pipefail

          mkdir -p dist
          cp -L result-linux dist/rlru-linux-x86_64.tar.gz

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: rlru-linux-x86_64
          path: dist/rlru-linux-x86_64.tar.gz
          if-no-files-found: error

  windows:
    name: Windows x86_64
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build Windows distribution archive
        run: |
          nix build .#dist-windows-x86_64 --out-link result-windows

      - name: Stage Windows artifact
        run: |
          set -euo pipefail

          mkdir -p dist
          cp -L result-windows dist/rlru-windows-x86_64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: rlru-windows-x86_64
          path: dist/rlru-windows-x86_64.zip
          if-no-files-found: error
