name: Auto-tag release

# When the rlru package version changes on main, automatically create the
# matching vX.Y.Z tag and kick off the release pipeline in
# distributable-binaries.yml (binaries + crates.io publish + GitHub release).
#
# A tag *pushed* with the default GITHUB_TOKEN intentionally does NOT start new
# workflow runs (GitHub's recursive-run guard), so instead of relying on a
# Personal Access Token we explicitly dispatch the release workflow against the
# new tag. `workflow_dispatch` is exempt from that guard, so this works with the
# built-in token and needs no extra secret.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  auto-tag:
    name: Tag version bumps
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read rlru version
        id: version
        run: |
          set -euo pipefail
          version="$(sed -n '0,/^version = "\(.*\)"$/s//\1/p' Cargo.toml)"
          if [[ -z "$version" ]]; then
            echo "could not determine rlru version from Cargo.toml" >&2
            exit 1
          fi
          echo "version=$version" >>"$GITHUB_OUTPUT"
          echo "tag=v$version" >>"$GITHUB_OUTPUT"

      - name: Create tag and trigger release
        env:
          TAG: ${{ steps.version.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "tag $TAG already exists; nothing to do"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"
          echo "created and pushed $TAG"

          # The tag push above (GITHUB_TOKEN) does not trigger the tag-gated
          # release jobs, so dispatch them explicitly against the new tag.
          gh workflow run distributable-binaries.yml --ref "$TAG"
          echo "dispatched distributable-binaries.yml for $TAG"
